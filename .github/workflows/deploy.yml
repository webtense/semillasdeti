name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build project
        working-directory: web
        run: npm run build

      - name: Package dist
        run: |
          tar -czf semillasdeti-dist.tar.gz -C web/dist .

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "semillasdeti-dist.tar.gz"
          target: "/tmp/semillasdeti-dist.tar.gz"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -euo pipefail
            APP_DIR="/var/www/semillasdeti"
            sudo systemctl stop semillasdeti || true
            sudo mkdir -p "$APP_DIR"
            sudo rm -rf "$APP_DIR"/*
            sudo tar -xzf /tmp/semillasdeti-dist.tar.gz -C "$APP_DIR"
            sudo chown -R $USER:$USER "$APP_DIR"
            sudo systemctl start semillasdeti
